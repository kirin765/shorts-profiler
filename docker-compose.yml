services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shorts_profiler
      POSTGRES_USER: shorts
      POSTGRES_PASSWORD: shorts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shorts"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage:/app/storage
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - storage:/app/storage
    command: ["sh", "-c", "rq worker $${QUEUE_NAME} --url $${REDIS_URL}"]

volumes:
  pgdata:
  storage:
